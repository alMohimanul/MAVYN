[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

# SQLAlchemy generates dynamic base classes
[mypy-lemma.db.models]
ignore_errors = True

# CLI has dynamic Paper iteration
[mypy-lemma.cli.commands]
ignore_errors = True

# Repository has dynamic path handling
[mypy-lemma.db.repository]
ignore_errors = True
